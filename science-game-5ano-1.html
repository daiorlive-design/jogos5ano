<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌊 AquaQuest — Ciências 5º Ano</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --ocean: #0077b6;
  --ocean-light: #00b4d8;
  --ocean-dark: #03045e;
  --teal: #06d6a0;
  --yellow: #ffd166;
  --coral: #ef476f;
  --sand: #fef9ef;
  --white: #ffffff;
  --text: #1a1a2e;
  --text-muted: #5a6a8a;
  --shadow: 0 8px 32px rgba(3,4,94,0.15);
  --radius: 20px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Nunito', sans-serif;
  background: linear-gradient(160deg, #e0f4ff 0%, #b8e8ff 40%, #d4f5e9 100%);
  min-height: 100vh;
  color: var(--text);
  overflow-x: hidden;
}

/* ═══════════════════════════════
   ANIMATED BACKGROUND BUBBLES
═══════════════════════════════ */
.bubbles {
  position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
}
.bubble {
  position: absolute; border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.6), rgba(0,180,216,0.1));
  border: 1px solid rgba(255,255,255,0.5);
  animation: floatUp linear infinite;
}
@keyframes floatUp {
  0% { transform: translateY(110vh) scale(0.8); opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 0.6; }
  100% { transform: translateY(-10vh) scale(1.1); opacity: 0; }
}

/* ═══════════════════════════════
   SCREENS
═══════════════════════════════ */
.screen { display: none; position: relative; z-index: 10; }
.screen.active { display: block; }

/* ═══════════════════════════════
   HOME SCREEN
═══════════════════════════════ */
#home {
  min-height: 100vh;
  display: none; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 2rem;
  text-align: center;
}
#home.active { display: flex; }

.logo-wrap {
  margin-bottom: 2rem;
  animation: dropIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) both;
}
@keyframes dropIn {
  from { transform: translateY(-60px) scale(0.7); opacity: 0; }
  to { transform: translateY(0) scale(1); opacity: 1; }
}

.logo-emoji { font-size: 80px; display: block; filter: drop-shadow(0 8px 16px rgba(0,119,182,0.3)); }
.logo-title {
  font-family: 'Fredoka One', cursive;
  font-size: clamp(42px, 8vw, 72px);
  color: var(--ocean-dark);
  letter-spacing: 2px;
  line-height: 1;
  margin-top: 0.5rem;
}
.logo-title span { color: var(--ocean-light); }
.logo-sub {
  font-size: 18px; font-weight: 700;
  color: var(--ocean);
  margin-top: 0.5rem;
  letter-spacing: 1px;
}

.home-card {
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(12px);
  border-radius: 28px;
  padding: 2rem;
  max-width: 520px;
  width: 100%;
  box-shadow: var(--shadow);
  border: 2px solid rgba(255,255,255,0.9);
  animation: slideUp 0.8s 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both;
}
@keyframes slideUp {
  from { transform: translateY(40px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

.home-card h2 {
  font-size: 20px; font-weight: 800;
  color: var(--ocean-dark);
  margin-bottom: 1.25rem;
}

.mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.mode-btn {
  background: white;
  border: 2.5px solid transparent;
  border-radius: 16px;
  padding: 1.1rem 0.75rem;
  cursor: pointer;
  transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  text-align: center;
}
.mode-btn:hover { transform: translateY(-4px) scale(1.03); }
.mode-btn.quiz { border-color: var(--ocean-light); background: linear-gradient(135deg, #e0f8ff, #b8eeff); }
.mode-btn.quiz:hover { border-color: var(--ocean); box-shadow: 0 8px 24px rgba(0,180,216,0.3); }
.mode-btn.match { border-color: var(--teal); background: linear-gradient(135deg, #d4faf0, #a8f3db); }
.mode-btn.match:hover { border-color: #02a87f; box-shadow: 0 8px 24px rgba(6,214,160,0.3); }
.mode-btn.fill { border-color: var(--yellow); background: linear-gradient(135deg, #fffbe6, #fff3b0); }
.mode-btn.fill:hover { border-color: #e6b800; box-shadow: 0 8px 24px rgba(255,209,102,0.4); }
.mode-btn.challenge { border-color: var(--coral); background: linear-gradient(135deg, #ffe8ee, #ffc8d5); }
.mode-btn.challenge:hover { border-color: #c73060; box-shadow: 0 8px 24px rgba(239,71,111,0.3); }
.mode-btn .icon { font-size: 36px; display: block; margin-bottom: 8px; }
.mode-btn .label { font-size: 13px; font-weight: 800; color: var(--ocean-dark); line-height: 1.3; }
.mode-btn .desc { font-size: 11px; color: var(--text-muted); margin-top: 3px; font-weight: 600; }

/* ═══════════════════════════════
   GAME HEADER
═══════════════════════════════ */
.game-header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(16px);
  border-bottom: 2px solid rgba(0,180,216,0.2);
  padding: 0.85rem 1.5rem;
  display: flex; align-items: center; gap: 1rem;
}
.back-btn {
  background: var(--ocean-light); color: white;
  border: none; border-radius: 12px;
  padding: 8px 14px; font-size: 18px; cursor: pointer;
  font-family: inherit; font-weight: 700;
  transition: all 0.2s;
}
.back-btn:hover { background: var(--ocean); transform: scale(1.05); }

.game-title {
  font-family: 'Fredoka One', cursive;
  font-size: 20px; color: var(--ocean-dark);
  flex: 1;
}
.score-badge {
  background: linear-gradient(135deg, var(--yellow), #ffb700);
  border-radius: 12px; padding: 6px 14px;
  font-size: 16px; font-weight: 800;
  color: var(--ocean-dark);
  box-shadow: 0 3px 12px rgba(255,183,0,0.35);
}
.progress-bar-wrap {
  background: rgba(0,180,216,0.15);
  border-radius: 99px; height: 8px;
  overflow: hidden; flex: 1; max-width: 200px;
}
.progress-bar-fill {
  height: 100%; background: linear-gradient(90deg, var(--ocean-light), var(--teal));
  border-radius: 99px; transition: width 0.5s ease;
}

/* ═══════════════════════════════
   GAME CONTENT
═══════════════════════════════ */
.game-content {
  max-width: 700px; margin: 0 auto;
  padding: 1.5rem 1.25rem 3rem;
}

/* ═══════════════════════════════
   QUIZ MODE
═══════════════════════════════ */
.q-card {
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(12px);
  border-radius: var(--radius);
  padding: 1.75rem;
  box-shadow: var(--shadow);
  border: 2px solid rgba(255,255,255,0.95);
  animation: cardIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
}
@keyframes cardIn {
  from { transform: scale(0.9) translateY(20px); opacity: 0; }
  to { transform: scale(1) translateY(0); opacity: 1; }
}

.q-topic {
  display: inline-block;
  padding: 4px 12px; border-radius: 99px;
  font-size: 11px; font-weight: 800; letter-spacing: 0.5px;
  text-transform: uppercase; margin-bottom: 1rem;
}
.topic-agua { background: #dff0ff; color: var(--ocean); }
.topic-oceano { background: #d4f5e9; color: #027a5b; }
.topic-ciclo { background: #fff3b0; color: #8a6800; }
.topic-geral { background: #ffe8ee; color: #a02040; }

.q-text {
  font-size: 18px; font-weight: 800;
  color: var(--ocean-dark);
  line-height: 1.5; margin-bottom: 1.5rem;
}

.options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
@media(max-width:480px) { .options-grid { grid-template-columns: 1fr; } }

.opt-btn {
  background: white;
  border: 2.5px solid #e8f4ff;
  border-radius: 14px; padding: 12px 14px;
  font-family: 'Nunito', sans-serif;
  font-size: 13px; font-weight: 700;
  color: var(--text); cursor: pointer; text-align: left;
  transition: all 0.2s; line-height: 1.4;
  display: flex; align-items: flex-start; gap: 10px;
}
.opt-btn:hover:not(:disabled) {
  border-color: var(--ocean-light);
  background: #e8f9ff;
  transform: translateY(-2px);
  box-shadow: 0 4px 16px rgba(0,180,216,0.2);
}
.opt-letter {
  width: 26px; height: 26px; border-radius: 8px;
  background: linear-gradient(135deg, var(--ocean-light), var(--ocean));
  color: white; font-size: 12px; font-weight: 800;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.opt-btn.correct { border-color: var(--teal); background: #d4faf0; }
.opt-btn.correct .opt-letter { background: var(--teal); }
.opt-btn.wrong { border-color: var(--coral); background: #ffe8ee; }
.opt-btn.wrong .opt-letter { background: var(--coral); }
.opt-btn:disabled { cursor: default; }

.feedback-box {
  margin-top: 1.25rem; padding: 14px 16px;
  border-radius: 14px; font-size: 14px; font-weight: 700;
  line-height: 1.6; display: none;
}
.feedback-box.ok { background: #d4faf0; color: #027a5b; border: 2px solid var(--teal); display: block; }
.feedback-box.no { background: #ffe8ee; color: #8a1030; border: 2px solid var(--coral); display: block; }

.next-btn {
  margin-top: 1.25rem; width: 100%;
  background: linear-gradient(135deg, var(--ocean-light), var(--ocean));
  color: white; border: none; border-radius: 14px;
  padding: 14px; font-family: 'Fredoka One', cursive;
  font-size: 18px; cursor: pointer; letter-spacing: 1px;
  transition: all 0.25s; box-shadow: 0 6px 20px rgba(0,119,182,0.35);
  display: none;
}
.next-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(0,119,182,0.45); }

/* ═══════════════════════════════
   MATCH MODE
═══════════════════════════════ */
.match-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.match-card {
  background: white;
  border: 2.5px solid #e8f4ff;
  border-radius: 16px; padding: 14px;
  font-size: 13px; font-weight: 700;
  cursor: pointer; text-align: center;
  min-height: 70px; display: flex;
  align-items: center; justify-content: center;
  line-height: 1.4; transition: all 0.2s;
  color: var(--text);
}
.match-card.term { border-color: #b8eeff; background: #e8f9ff; }
.match-card.def { border-color: #d4faf0; background: #edfaf5; }
.match-card:hover:not(.matched):not(.wrong-match) { transform: scale(1.03); box-shadow: 0 6px 20px rgba(0,180,216,0.2); }
.match-card.selected { border-color: var(--ocean); background: #cceeff; transform: scale(1.04); box-shadow: 0 6px 20px rgba(0,119,182,0.3); }
.match-card.matched { border-color: var(--teal); background: #d4faf0; cursor: default; opacity: 0.7; }
.match-card.wrong-match { border-color: var(--coral); background: #ffe8ee; animation: shake 0.4s; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }

.match-instructions {
  background: rgba(255,255,255,0.8);
  border-radius: 14px; padding: 12px 16px;
  font-size: 13px; font-weight: 700; color: var(--ocean);
  text-align: center; margin-bottom: 1rem;
  border: 2px solid rgba(0,180,216,0.2);
}

/* ═══════════════════════════════
   FILL IN THE BLANK
═══════════════════════════════ */
.fill-card {
  background: rgba(255,255,255,0.92);
  border-radius: var(--radius);
  padding: 1.75rem;
  box-shadow: var(--shadow);
  border: 2px solid rgba(255,255,255,0.95);
}
.fill-sentence {
  font-size: 17px; font-weight: 700;
  color: var(--ocean-dark); line-height: 2;
  margin-bottom: 1.25rem;
}
.fill-blank {
  display: inline-block;
  min-width: 120px; border-bottom: 3px solid var(--ocean-light);
  padding: 0 8px; margin: 0 4px;
  font-weight: 800; color: var(--ocean);
  text-align: center;
}
.word-bank {
  display: flex; flex-wrap: wrap; gap: 8px;
  margin-bottom: 1.25rem;
}
.word-chip {
  background: white;
  border: 2.5px solid #b8eeff;
  border-radius: 12px; padding: 8px 16px;
  font-size: 14px; font-weight: 800;
  cursor: pointer; transition: all 0.2s;
  color: var(--ocean-dark);
}
.word-chip:hover { background: #e8f9ff; border-color: var(--ocean-light); transform: translateY(-2px); }
.word-chip.used { opacity: 0.35; cursor: default; pointer-events: none; }
.word-chip.wrong-word { border-color: var(--coral); background: #ffe8ee; animation: shake 0.4s; }

/* ═══════════════════════════════
   CHALLENGE / SPEED MODE
═══════════════════════════════ */
.timer-ring {
  width: 80px; height: 80px; margin: 0 auto 1rem;
  position: relative;
}
.timer-ring svg { transform: rotate(-90deg); }
.timer-ring circle { fill: none; stroke-width: 6; }
.timer-track { stroke: rgba(0,180,216,0.15); }
.timer-fill { stroke: var(--ocean-light); stroke-linecap: round; transition: stroke-dashoffset 1s linear; }
.timer-num {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Fredoka One', cursive; font-size: 28px;
  color: var(--ocean-dark);
}
.timer-num.urgent { color: var(--coral); animation: pulse 0.5s infinite alternate; }
@keyframes pulse { to { transform: scale(1.15); } }

/* ═══════════════════════════════
   RESULT SCREEN
═══════════════════════════════ */
#result {
  min-height: 100vh;
  display: none; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 2rem; text-align: center;
}
#result.active { display: flex; }
.result-card {
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(12px);
  border-radius: 28px; padding: 2.5rem 2rem;
  max-width: 480px; width: 100%;
  box-shadow: var(--shadow);
  border: 2px solid rgba(255,255,255,0.95);
}
.result-emoji { font-size: 72px; display: block; margin-bottom: 0.75rem; }
.result-title {
  font-family: 'Fredoka One', cursive;
  font-size: 32px; color: var(--ocean-dark);
  margin-bottom: 0.5rem;
}
.result-score-big {
  font-family: 'Fredoka One', cursive;
  font-size: 56px; color: var(--ocean);
  line-height: 1;
}
.result-msg { font-size: 15px; color: var(--text-muted); font-weight: 700; margin-top: 0.5rem; }
.stars { font-size: 36px; margin: 1rem 0; letter-spacing: 8px; }
.result-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 1.5rem; }
.result-btn {
  padding: 12px 20px; border-radius: 14px; border: none;
  font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 800;
  cursor: pointer; transition: all 0.2s;
}
.result-btn.primary {
  background: linear-gradient(135deg, var(--ocean-light), var(--ocean));
  color: white; box-shadow: 0 6px 20px rgba(0,119,182,0.3);
}
.result-btn.secondary {
  background: white; color: var(--ocean);
  border: 2.5px solid var(--ocean-light);
}
.result-btn:hover { transform: translateY(-2px); }

/* ═══════════════════════════════
   CONFETTI
═══════════════════════════════ */
.confetti-piece {
  position: fixed; top: -10px;
  border-radius: 3px;
  animation: confettiFall linear forwards;
  pointer-events: none; z-index: 999;
}
@keyframes confettiFall {
  to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
}

/* ═══════════════════════════════
   UTILITY
═══════════════════════════════ */
.section-label {
  font-size: 12px; font-weight: 800;
  color: var(--text-muted); letter-spacing: 1px;
  text-transform: uppercase; margin-bottom: 0.75rem;
}
.counter { font-size: 13px; font-weight: 700; color: var(--text-muted); }
</style>
</head>
<body>

<!-- Animated background bubbles -->
<div class="bubbles" id="bubbles"></div>

<!-- ═══ HOME SCREEN ═══ -->
<div id="home" class="screen active">
  <div class="logo-wrap">
    <span class="logo-emoji">🌊</span>
    <div class="logo-title">Aqua<span>Quest</span></div>
    <div class="logo-sub">Ciências · 5º Ano</div>
  </div>
  <div class="home-card">
    <h2>Escolha como quer estudar! 🎮</h2>
    <div class="mode-grid">
      <button class="mode-btn quiz" onclick="startMode('quiz')">
        <span class="icon">❓</span>
        <div class="label">Quiz Múltipla Escolha</div>
        <div class="desc">25 perguntas completas</div>
      </button>
      <button class="mode-btn match" onclick="startMode('match')">
        <span class="icon">🔗</span>
        <div class="label">Liga os Conceitos</div>
        <div class="desc">Une termos e definições</div>
      </button>
      <button class="mode-btn fill" onclick="startMode('fill')">
        <span class="icon">✏️</span>
        <div class="label">Preencha as Lacunas</div>
        <div class="desc">Complete as frases</div>
      </button>
      <button class="mode-btn challenge" onclick="startMode('challenge')">
        <span class="icon">⚡</span>
        <div class="label">Desafio Relâmpago</div>
        <div class="desc">Contra o tempo! 15s cada</div>
      </button>
    </div>
  </div>
</div>

<!-- ═══ QUIZ SCREEN ═══ -->
<div id="quiz-screen" class="screen">
  <div class="game-header">
    <button class="back-btn" onclick="goHome()">←</button>
    <div class="game-title">❓ Quiz</div>
    <div class="counter" id="quiz-counter">1/25</div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="quiz-progress" style="width:4%"></div>
    </div>
    <div class="score-badge">⭐ <span id="quiz-score">0</span></div>
  </div>
  <div class="game-content">
    <div class="q-card" id="quiz-card">
      <div class="q-topic" id="q-topic"></div>
      <div class="q-text" id="q-text"></div>
      <div class="options-grid" id="q-options"></div>
      <div class="feedback-box" id="q-feedback"></div>
      <button class="next-btn" id="q-next" onclick="nextQuiz()">Próxima →</button>
    </div>
  </div>
</div>

<!-- ═══ MATCH SCREEN ═══ -->
<div id="match-screen" class="screen">
  <div class="game-header">
    <button class="back-btn" onclick="goHome()">←</button>
    <div class="game-title">🔗 Liga os Conceitos</div>
    <div class="score-badge">✅ <span id="match-score">0</span>/8</div>
  </div>
  <div class="game-content">
    <div class="match-instructions">Clique em um TERMO e depois na sua DEFINIÇÃO correta!</div>
    <div class="section-label">Termos</div>
    <div class="match-grid" id="match-terms" style="margin-bottom:1rem"></div>
    <div class="section-label">Definições</div>
    <div class="match-grid" id="match-defs"></div>
  </div>
</div>

<!-- ═══ FILL SCREEN ═══ -->
<div id="fill-screen" class="screen">
  <div class="game-header">
    <button class="back-btn" onclick="goHome()">←</button>
    <div class="game-title">✏️ Preencha as Lacunas</div>
    <div class="counter" id="fill-counter">1/10</div>
    <div class="score-badge">⭐ <span id="fill-score">0</span></div>
  </div>
  <div class="game-content">
    <div class="fill-card">
      <div class="q-topic" id="fill-topic"></div>
      <div class="fill-sentence" id="fill-sentence"></div>
      <div class="section-label">Banco de palavras:</div>
      <div class="word-bank" id="fill-words"></div>
      <div class="feedback-box" id="fill-feedback"></div>
      <button class="next-btn" id="fill-next" onclick="nextFill()">Próxima →</button>
    </div>
  </div>
</div>

<!-- ═══ CHALLENGE SCREEN ═══ -->
<div id="challenge-screen" class="screen">
  <div class="game-header">
    <button class="back-btn" onclick="goHome()">←</button>
    <div class="game-title">⚡ Relâmpago</div>
    <div class="counter" id="ch-counter">1/20</div>
    <div class="score-badge">🔥 <span id="ch-score">0</span></div>
  </div>
  <div class="game-content">
    <div class="timer-ring">
      <svg viewBox="0 0 80 80" width="80" height="80">
        <circle class="timer-track" cx="40" cy="40" r="34"/>
        <circle class="timer-fill" id="timer-circle" cx="40" cy="40" r="34"
          stroke-dasharray="213.6" stroke-dashoffset="0"/>
      </svg>
      <div class="timer-num" id="timer-num">15</div>
    </div>
    <div class="q-card" id="ch-card">
      <div class="q-topic" id="ch-topic"></div>
      <div class="q-text" id="ch-text"></div>
      <div class="options-grid" id="ch-options"></div>
      <div class="feedback-box" id="ch-feedback"></div>
      <button class="next-btn" id="ch-next" onclick="nextChallenge()">Próxima →</button>
    </div>
  </div>
</div>

<!-- ═══ RESULT SCREEN ═══ -->
<div id="result" class="screen">
  <div class="result-card">
    <span class="result-emoji" id="r-emoji"></span>
    <div class="result-title" id="r-title"></div>

/* ═══════════════════════════════

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goHome() {
  clearInterval(state.timerInterval);
  showScreen('home');
}

function playAgain() {
  startMode(state.mode);
}

function shuffle(arr) {
  return [...arr].sort(() => Math.random() - 0.5);
}

/* ═══════════════════════════════
   MODE STARTERS
═══════════════════════════════ */
function startMode(mode) {
  state.mode = mode;
  state.score = 0;
  state.currentQ = 0;
  state.answered = false;
  clearInterval(state.timerInterval);

  if (mode === 'quiz') {
    state.questions = shuffle(quizData).slice(0, 25);
    state.total = state.questions.length;
    showScreen('quiz-screen');
    renderQuiz();
  } else if (mode === 'match') {
    showScreen('match-screen');
    renderMatch();
  } else if (mode === 'fill') {
    state.questions = shuffle(fillData);
    state.total = state.questions.length;
    showScreen('fill-screen');
    renderFill();
  } else if (mode === 'challenge') {
    state.questions = shuffle(quizData).slice(0, 20);
    state.total = state.questions.length;
    showScreen('challenge-screen');
    renderChallenge();
  }
}

/* ═══════════════════════════════
   QUIZ MODE
═══════════════════════════════ */
function renderQuiz() {
  const q = state.questions[state.currentQ];
  state.answered = false;

  document.getElementById('quiz-counter').textContent =
    `${state.currentQ+1}/${state.total}`;
  document.getElementById('quiz-progress').style.width =
    `${((state.currentQ+1)/state.total)*100}%`;
  document.getElementById('quiz-score').textContent = state.score;

  const topicEl = document.getElementById('q-topic');
  topicEl.textContent = q.topicLabel;
  topicEl.className = 'q-topic topic-' + q.topic;

  document.getElementById('q-text').textContent = q.q;
  document.getElementById('q-feedback').className = 'feedback-box';
  document.getElementById('q-next').style.display = 'none';

  const letters = ['A','B','C','D'];
  const optsHtml = q.opts.map((opt, i) =>
    `<button class="opt-btn" onclick="answerQuiz(${i})" id="qopt${i}">
      <span class="opt-letter">${letters[i]}</span><span>${opt}</span>
    </button>`
  ).join('');
  document.getElementById('q-options').innerHTML = optsHtml;

  // Animate card
  const card = document.getElementById('quiz-card');
  card.style.animation = 'none';
  void card.offsetWidth;
  card.style.animation = 'cardIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both';
}

function answerQuiz(chosen) {
  if (state.answered) return;
  state.answered = true;
  const q = state.questions[state.currentQ];
  const btns = document.querySelectorAll('.opt-btn');
  btns.forEach(b => b.disabled = true);
  btns[q.correct].classList.add('correct');

  const fb = document.getElementById('q-feedback');
  if (chosen === q.correct) {
    state.score++;
    document.getElementById('quiz-score').textContent = state.score;
    btns[chosen].classList.add('correct');
    fb.className = 'feedback-box ok';
    fb.textContent = '✅ Correto! ' + q.explain;
  } else {
    btns[chosen].classList.add('wrong');
    fb.className = 'feedback-box no';
    fb.textContent = '❌ Errado. ' + q.explain;
  }
  document.getElementById('q-next').style.display = 'block';
}

function nextQuiz() {
  state.currentQ++;
  if (state.currentQ >= state.total) {
    showResult('quiz');
  } else {
    renderQuiz();
  }
}

/* ═══════════════════════════════
   MATCH MODE
═══════════════════════════════ */
let matchPairs, matchShuffledDefs, matchSelectedTerm, matchSelectedDef;

function renderMatch() {
  matchPairs = shuffle(matchData);
  matchShuffledDefs = shuffle(matchPairs.map(p => p.def));
  matchSelectedTerm = null;
  matchSelectedDef = null;
  state.matchCorrect = 0;
  document.getElementById('match-score').textContent = '0';

  const termsHtml = matchPairs.map((p, i) =>
    `<div class="match-card term" id="term${i}" onclick="selectTerm(${i})">${p.term}</div>`
  ).join('');
  document.getElementById('match-terms').innerHTML = termsHtml;

  const defsHtml = matchShuffledDefs.map((d, i) =>
    `<div class="match-card def" id="def${i}" onclick="selectDef(${i})">${d}</div>`
  ).join('');
  document.getElementById('match-defs').innerHTML = defsHtml;
}

function selectTerm(i) {
  const el = document.getElementById('term'+i);
  if (el.classList.contains('matched')) return;

  // Deselect previous
  if (matchSelectedTerm !== null) {
    document.getElementById('term'+matchSelectedTerm).classList.remove('selected');
  }
  matchSelectedTerm = i;
  el.classList.add('selected');
  checkMatch();
}

function selectDef(i) {
  const el = document.getElementById('def'+i);
  if (el.classList.contains('matched')) return;

  if (matchSelectedDef !== null) {
    document.getElementById('def'+matchSelectedDef).classList.remove('selected');
  }
  matchSelectedDef = i;
  el.classList.add('selected');
  checkMatch();
}

function checkMatch() {
  if (matchSelectedTerm === null || matchSelectedDef === null) return;

  const term = matchPairs[matchSelectedTerm].term;
  const selectedDef = matchShuffledDefs[matchSelectedDef];
  const correctDef = matchPairs[matchSelectedTerm].def;

  const termEl = document.getElementById('term'+matchSelectedTerm);
  const defEl = document.getElementById('def'+matchSelectedDef);

  if (selectedDef === correctDef) {
    termEl.classList.remove('selected'); termEl.classList.add('matched');
    defEl.classList.remove('selected'); defEl.classList.add('matched');
    state.matchCorrect++;
    document.getElementById('match-score').textContent = state.matchCorrect;
    matchSelectedTerm = null; matchSelectedDef = null;

    if (state.matchCorrect === matchPairs.length) {
      setTimeout(() => {
        state.score = state.matchCorrect;
        state.total = matchPairs.length;
        showResult('match');
      }, 600);
    }
  } else {
    termEl.classList.add('wrong-match'); defEl.classList.add('wrong-match');
    setTimeout(() => {
      termEl.classList.remove('selected','wrong-match');
      defEl.classList.remove('selected','wrong-match');
      matchSelectedTerm = null; matchSelectedDef = null;
    }, 600);
  }
}

  document.querySelectorAll('.word-chip').forEach(c => {
    c.classList.add('used');
    if (c.textContent === word) c.classList.remove('used');
  });

  document.getElementById('fill-blank').textContent = word;
  const fb = document.getElementById('fill-feedback');

  if (word === answer) {
    state.score++;
    document.getElementById('fill-score').textContent = state.score;
    document.getElementById('fill-blank').style.color = 'var(--teal)';
    fb.className = 'feedback-box ok';
    fb.textContent = '✅ Correto! Muito bem!';
  } else {
    document.getElementById('fill-blank').style.color = 'var(--coral)';
    fb.className = 'feedback-box no';
    fb.textContent = `❌ A resposta correta era: "${answer}"`;
  }
  document.getElementById('fill-next').style.display = 'block';
}

function nextFill() {
  state.currentQ++;
  if (state.currentQ >= state.total) {
    showResult('fill');
  } else {
    renderFill();
  }
}

/* ═══════════════════════════════
   CHALLENGE MODE
═══════════════════════════════ */
const TIMER_MAX = 15;
const CIRCUMFERENCE = 213.6;

function renderChallenge() {
  const q = state.questions[state.currentQ];
  state.answered = false;
  clearInterval(state.timerInterval);
  state.timeLeft = TIMER_MAX;

  document.getElementById('ch-counter').textContent =
    `${state.currentQ+1}/${state.total}`;
  document.getElementById('ch-score').textContent = state.score;

  const topicEl = document.getElementById('ch-topic');
  topicEl.textContent = q.topicLabel;
  topicEl.className = 'q-topic topic-' + q.topic;
  document.getElementById('ch-text').textContent = q.q;
  document.getElementById('ch-feedback').className = 'feedback-box';
  document.getElementById('ch-next').style.display = 'none';

  const letters = ['A','B','C','D'];
  document.getElementById('ch-options').innerHTML = q.opts.map((opt, i) =>
    `<button class="opt-btn" onclick="answerChallenge(${i})" id="chopt${i}">
      <span class="opt-letter">${letters[i]}</span><span>${opt}</span>
    </button>`
  ).join('');

  // Animate card
  const card = document.getElementById('ch-card');
  card.style.animation = 'none';
  void card.offsetWidth;
  card.style.animation = 'cardIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both';

  updateTimerDisplay();
  state.timerInterval = setInterval(() => {
    state.timeLeft--;
    updateTimerDisplay();
    if (state.timeLeft <= 0) {
      clearInterval(state.timerInterval);
      if (!state.answered) timeOut();
    }
  }, 1000);
}

function updateTimerDisplay() {
  const pct = state.timeLeft / TIMER_MAX;
  const offset = CIRCUMFERENCE * (1 - pct);
  const circle = document.getElementById('timer-circle');
  const num = document.getElementById('timer-num');
  circle.style.strokeDashoffset = offset;
  num.textContent = state.timeLeft;
  if (state.timeLeft <= 5) {
    circle.style.stroke = 'var(--coral)';
    num.className = 'timer-num urgent';
  } else {
    circle.style.stroke = 'var(--ocean-light)';
    num.className = 'timer-num';
  }
}

function answerChallenge(chosen) {
  if (state.answered) return;
  state.answered = true;
  clearInterval(state.timerInterval);
  const q = state.questions[state.currentQ];
  const btns = document.querySelectorAll('#ch-options .opt-btn');
  btns.forEach(b => b.disabled = true);
  btns[q.correct].classList.add('correct');

  const fb = document.getElementById('ch-feedback');
  const timeBonus = state.timeLeft >= 10 ? 2 : 1;

  if (chosen === q.correct) {
    state.score += timeBonus;
    document.getElementById('ch-score').textContent = state.score;
    btns[chosen].classList.add('correct');
    fb.className = 'feedback-box ok';
    fb.textContent = `✅ Correto! +${timeBonus} ponto${timeBonus>1?'s':''} (${state.timeLeft}s restantes)`;
  } else {
    btns[chosen].classList.add('wrong');
    fb.className = 'feedback-box no';
    fb.textContent = '❌ Errado. ' + q.explain;
  }
  document.getElementById('ch-next').style.display = 'block';
}

function timeOut() {
  state.answered = true;
  const q = state.questions[state.currentQ];
  const btns = document.querySelectorAll('#ch-options .opt-btn');
  btns.forEach(b => b.disabled = true);
  btns[q.correct].classList.add('correct');
  const fb = document.getElementById('ch-feedback');
  fb.className = 'feedback-box no';
  fb.textContent = '⏰ Tempo esgotado! ' + q.explain;
  document.getElementById('ch-next').style.display = 'block';
}

function nextChallenge() {
  state.currentQ++;
  if (state.currentQ >= state.total) {
    showResult('challenge');
  } else {
    renderChallenge();
  }
}

/* ═══════════════════════════════
   RESULT
═══════════════════════════════ */
function showResult(mode) {
  clearInterval(state.timerInterval);
  const maxScore = mode === 'challenge' ? state.total * 2 : state.total;
  const pct = mode === 'match'
    ? (state.score / state.total * 100)
    : (state.score / maxScore * 100);

  let emoji, title, msg, stars;
  if (pct === 100) { emoji='🏆'; title='Perfeito!'; stars='⭐⭐⭐'; msg='Incrível! Você acertou tudo! Está pronto para a prova!'; }
  else if (pct >= 75) { emoji='🌟'; title='Muito bem!'; stars='⭐⭐'; msg='Excelente trabalho! Estude mais um pouquinho e vai arrasar!'; }
  else if (pct >= 50) { emoji='👏'; title='Bom trabalho!'; stars='⭐'; msg='Você está no caminho certo! Continue praticando!'; }
  else { emoji='💪'; title='Continue tentando!'; stars='⭐'; msg='Não desista! Revise o material e tente de novo. Você consegue!'; }

  document.getElementById('r-emoji').textContent = emoji;
  document.getElementById('r-title').textContent = title;
  document.getElementById('r-stars').textContent = stars;
  document.getElementById('r-msg').textContent = msg;

  if (mode === 'challenge') {
    document.getElementById('r-score').textContent = `${state.score} pts`;
  } else {
    document.getElementById('r-score').textContent =
      `${state.score}/${state.total}`;
  }

  showScreen('result');
  if (pct >= 75) launchConfetti();
}

/* ═══════════════════════════════
   CONFETTI
═══════════════════════════════ */
function launchConfetti() {
  const colors = ['#00b4d8','#06d6a0','#ffd166','#ef476f','#0077b6','#ffffff'];
  for (let i = 0; i < 60; i++) {
    setTimeout(() => {
      const c = document.createElement('div');
      c.className = 'confetti-piece';
      const size = Math.random() * 10 + 6;
      c.style.cssText = `
        left: ${Math.random()*100}%;
        width: ${size}px; height: ${size * (Math.random()*1.5+0.5)}px;
        background: ${colors[Math.floor(Math.random()*colors.length)]};
        animation-duration: ${Math.random()*2+2}s;
        animation-delay: ${Math.random()*0.5}s;
        transform: rotate(${Math.random()*360}deg);
      `;
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 3500);
    }, i * 30);
  }
}
</script>
